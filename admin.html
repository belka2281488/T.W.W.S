<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TWWS — Панель управления</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #FF6B00;
  --orange-bright: #FF8C00;
  --orange-dim: #CC4400;
  --orange-glow: rgba(255,107,0,0.35);
  --bg: #0A0703;
  --bg2: #0F0A05;
  --card: #130D06;
  --card2: #1A1108;
  --border: rgba(255,107,0,0.18);
  --text: #E8D5B0;
  --text-muted: #8A7560;
  --white: #FFF5E8;
  --green: #5BDB79;
  --red: #FF6B6B;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:"Rajdhani",sans-serif; min-height:100vh; }

/* LOGIN */
#loginScreen {
  min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:1.5rem;
}
.login-box {
  background:var(--card); border:1px solid var(--border); padding:3rem; width:340px; text-align:center;
}
.login-title { font-family:"Bebas Neue",sans-serif; font-size:2rem; letter-spacing:4px; color:var(--orange); margin-bottom:1.5rem; }
.login-box input {
  width:100%; background:var(--bg2); border:1px solid var(--border); color:var(--white);
  padding:.8rem 1rem; font-family:"Share Tech Mono",monospace; font-size:.9rem;
  letter-spacing:2px; margin-bottom:1rem; outline:none;
  transition:border-color .2s;
}
.login-box input:focus { border-color:var(--orange); }
.login-error { color:var(--red); font-size:.85rem; letter-spacing:1px; min-height:1.2rem; margin-bottom:.5rem; }

/* BUTTONS */
.btn {
  display:inline-flex; align-items:center; gap:.5rem;
  padding:.65rem 1.5rem; font-family:"Bebas Neue",sans-serif;
  font-size:1rem; letter-spacing:3px; border:none; cursor:pointer;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  transition:all .2s;
}
.btn-orange { background:var(--orange); color:var(--bg); }
.btn-orange:hover { background:var(--orange-bright); box-shadow:0 0 20px rgba(255,107,0,0.4); }
.btn-ghost { background:transparent; color:var(--orange); border:1px solid var(--orange); clip-path:none; }
.btn-ghost:hover { background:rgba(255,107,0,0.08); }
.btn-red { background:rgba(255,107,107,0.15); color:var(--red); border:1px solid rgba(255,107,107,0.3); clip-path:none; }
.btn-red:hover { background:rgba(255,107,107,0.25); }
.btn-green { background:rgba(91,219,121,0.15); color:var(--green); border:1px solid rgba(91,219,121,0.3); clip-path:none; }
.btn-green:hover { background:rgba(91,219,121,0.25); }
.btn-sm { padding:.4rem .9rem; font-size:.8rem; letter-spacing:2px; }

/* ADMIN LAYOUT */
#adminScreen { display:none; }
.admin-nav {
  position:sticky; top:0; z-index:50;
  background:rgba(10,7,3,0.97); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 2rem; height:58px;
  backdrop-filter:blur(8px);
}
.admin-nav-logo { font-family:"Bebas Neue",sans-serif; font-size:1.3rem; letter-spacing:4px; color:var(--orange); }
.admin-nav-right { display:flex; align-items:center; gap:1rem; }
.admin-status { font-family:"Share Tech Mono",monospace; font-size:.7rem; letter-spacing:2px; color:var(--green); }

.admin-body { max-width:960px; margin:0 auto; padding:2.5rem 1.5rem; }

/* SECTION */
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; }
.section-title { font-family:"Bebas Neue",sans-serif; font-size:1.8rem; letter-spacing:3px; color:var(--white); }
.section-label { font-family:"Share Tech Mono",monospace; font-size:.65rem; letter-spacing:4px; color:var(--orange-dim); margin-bottom:.3rem; }

/* UPDATES LIST */
.updates-list { display:flex; flex-direction:column; gap:1rem; margin-bottom:3rem; }
.update-item {
  background:var(--card); border:1px solid var(--border); padding:1.2rem 1.5rem;
  display:flex; align-items:center; justify-content:space-between; gap:1rem;
  transition:border-color .2s;
}
.update-item:hover { border-color:rgba(255,107,0,0.35); }
.update-item-left { display:flex; align-items:center; gap:1rem; flex:1; }
.update-badge {
  font-family:"Bebas Neue",sans-serif; font-size:1.1rem; letter-spacing:2px;
  color:var(--orange); min-width:80px;
}
.update-badge.upcoming { color:var(--text-muted); }
.update-date-tag {
  font-family:"Share Tech Mono",monospace; font-size:.7rem; letter-spacing:2px;
  color:var(--text-muted); background:var(--bg2); padding:.2rem .6rem;
}
.update-preview-text { font-size:.9rem; color:var(--text-muted); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.update-item-actions { display:flex; gap:.5rem; flex-shrink:0; }
.upcoming-tag {
  font-family:"Share Tech Mono",monospace; font-size:.65rem; letter-spacing:2px;
  color:var(--orange); border:1px solid rgba(255,107,0,0.4); padding:.15rem .5rem;
  animation:pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

/* FORM */
.form-section {
  background:var(--card); border:1px solid var(--border); padding:2rem; margin-bottom:3rem;
}
.form-title { font-family:"Bebas Neue",sans-serif; font-size:1.5rem; letter-spacing:3px; color:var(--orange); margin-bottom:1.5rem; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
.form-full { grid-column:1/-1; }
.field { display:flex; flex-direction:column; gap:.4rem; }
.field label { font-family:"Share Tech Mono",monospace; font-size:.65rem; letter-spacing:3px; color:var(--text-muted); text-transform:uppercase; }
.field input, .field textarea {
  background:var(--bg2); border:1px solid var(--border); color:var(--white);
  padding:.75rem 1rem; font-family:"Rajdhani",sans-serif; font-size:1rem; font-weight:500;
  outline:none; resize:vertical; transition:border-color .2s;
}
.field input:focus, .field textarea:focus { border-color:var(--orange); }
.field textarea { min-height:140px; }
.field-hint { font-size:.8rem; color:var(--text-muted); margin-top:.2rem; }
.form-actions { display:flex; gap:.75rem; margin-top:1.5rem; align-items:center; flex-wrap:wrap; }

/* SCREENSHOTS */
.screenshots-area { display:flex; flex-wrap:wrap; gap:.75rem; margin-top:.75rem; }
.screenshot-thumb {
  position:relative; width:120px; height:80px;
  border:1px solid var(--border); overflow:hidden; cursor:pointer;
  transition:border-color .2s;
}
.screenshot-thumb:hover { border-color:var(--orange); }
.screenshot-thumb img { width:100%; height:100%; object-fit:cover; }
.screenshot-thumb .remove-img {
  position:absolute; top:2px; right:2px;
  background:rgba(255,50,50,0.85); color:#fff; border:none; cursor:pointer;
  font-size:.65rem; padding:.1rem .3rem; font-family:"Share Tech Mono",monospace;
}
.upload-btn {
  width:120px; height:80px;
  border:1px dashed var(--border); background:var(--bg2);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.3rem;
  cursor:pointer; color:var(--text-muted); font-size:.75rem; letter-spacing:1px;
  transition:all .2s;
}
.upload-btn:hover { border-color:var(--orange); color:var(--orange); }
.upload-btn span { font-size:1.5rem; }

/* CHANGES EDITOR */
.changes-list { display:flex; flex-direction:column; gap:.5rem; margin-bottom:.75rem; }
.change-row { display:flex; gap:.5rem; align-items:center; }
.change-type {
  background:var(--bg2); border:1px solid var(--border); color:var(--white);
  padding:.5rem .6rem; font-family:"Share Tech Mono",monospace; font-size:.8rem;
  outline:none; cursor:pointer; width:70px; flex-shrink:0;
}
.change-input {
  flex:1; background:var(--bg2); border:1px solid var(--border); color:var(--white);
  padding:.5rem .75rem; font-family:"Rajdhani",sans-serif; font-size:.95rem; outline:none;
  transition:border-color .2s;
}
.change-input:focus { border-color:var(--orange); }
.change-del { background:none; border:none; color:var(--red); cursor:pointer; font-size:1.1rem; padding:.2rem .4rem; opacity:.6; }
.change-del:hover { opacity:1; }

/* TOAST */
.toast {
  position:fixed; bottom:2rem; right:2rem; z-index:999;
  background:var(--card2); border:1px solid var(--border); padding:1rem 1.5rem;
  font-family:"Share Tech Mono",monospace; font-size:.8rem; letter-spacing:2px;
  color:var(--green); box-shadow:0 0 30px rgba(0,0,0,0.5);
  transform:translateY(100px); opacity:0; transition:all .3s;
  pointer-events:none;
}
.toast.show { transform:translateY(0); opacity:1; }
.toast.error { color:var(--red); border-color:rgba(255,107,107,0.3); }

/* DIVIDER */
.divider { height:1px; background:var(--border); margin:2.5rem 0; }

/* CONFIRM MODAL */
.confirm-overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(5,3,1,0.9); backdrop-filter:blur(4px);
  align-items:center; justify-content:center;
}
.confirm-overlay.open { display:flex; }
.confirm-box {
  background:var(--card2); border:1px solid rgba(255,107,107,0.3);
  padding:2rem; max-width:380px; width:90%; text-align:center;
}
.confirm-box h3 { font-family:"Bebas Neue",sans-serif; font-size:1.5rem; letter-spacing:2px; color:var(--red); margin-bottom:.75rem; }
.confirm-box p { color:var(--text-muted); font-size:.95rem; margin-bottom:1.5rem; line-height:1.6; }
.confirm-actions { display:flex; gap:.75rem; justify-content:center; }

@media(max-width:600px) {
  .form-grid { grid-template-columns:1fr; }
  .form-full { grid-column:1; }
  .admin-body { padding:1.5rem 1rem; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-title">⚡ TWWS ADMIN</div>
    <input type="password" id="passInput" placeholder="ПАРОЛЬ" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-error" id="loginError"></div>
    <button class="btn btn-orange" style="width:100%;justify-content:center" onclick="doLogin()">ВОЙТИ</button>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <nav class="admin-nav">
    <div class="admin-nav-logo">⚡ TWWS ADMIN</div>
    <div class="admin-nav-right">
      <span class="admin-status" id="adminStatus">● ПОДКЛЮЧЕНО</span>
      <a href="index.html" class="btn btn-ghost btn-sm">← САЙТ</a>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">ВЫЙТИ</button>
    </div>
  </nav>

  <div class="admin-body">

    <!-- UPDATES LIST -->
    <div class="section-header">
      <div>
        <div class="section-label">// управление</div>
        <div class="section-title">Обновления</div>
      </div>
      <button class="btn btn-orange" onclick="showAddForm()">+ ДОБАВИТЬ</button>
    </div>
    <div class="updates-list" id="updatesList"></div>

    <div class="divider"></div>

    <!-- FORM -->
    <div class="form-section" id="formSection" style="display:none">
      <div class="form-title" id="formTitle">НОВОЕ ОБНОВЛЕНИЕ</div>
      <div class="form-grid">
        <div class="field">
          <label>Версия</label>
          <input type="text" id="fVersion" placeholder="v1.7.0">
        </div>
        <div class="field">
          <label>Дата (ДД.ММ.ГГГГ)</label>
          <input type="text" id="fDate" placeholder="01.03.2026">
          <div class="field-hint">Если дата в будущем — автоматически станет «Грядущим обновлением»</div>
        </div>
        <div class="field">
          <label>Время выхода (необязательно)</label>
          <input type="text" id="fTime" placeholder="20:15">
          <div class="field-hint">Только для грядущих — покажет таймер обратного отсчёта</div>
        </div>
        <div class="field form-full">
          <label>Список изменений</label>
          <div class="changes-list" id="changesList"></div>
          <button class="btn btn-ghost btn-sm" style="align-self:flex-start;margin-top:.25rem" onclick="addChangeRow()">+ СТРОКА</button>
        </div>
        <div class="field form-full">
          <label>Скриншоты</label>
          <div class="screenshots-area" id="screenshotsArea">
            <div class="upload-btn" onclick="document.getElementById(\'imgInput\').click()">
              <span>📷</span>загрузить
            </div>
          </div>
          <input type="file" id="imgInput" accept="image/*" multiple style="display:none" onchange="handleImgUpload(event)">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-orange" onclick="saveUpdate()">💾 СОХРАНИТЬ</button>
        <button class="btn btn-ghost" onclick="cancelForm()">ОТМЕНА</button>
        <span id="formMsg" style="font-family:\'Share Tech Mono\',monospace;font-size:.75rem;letter-spacing:2px;color:var(--text-muted)"></span>
      </div>
    </div>

  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>УДАЛИТЬ?</h3>
    <p id="confirmText">Это действие нельзя отменить.</p>
    <div class="confirm-actions">
      <button class="btn btn-red" onclick="confirmDelete()">УДАЛИТЬ</button>
      <button class="btn btn-ghost" onclick="closeConfirm()">ОТМЕНА</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════
//  КОНФИГ — ИЗМЕНИ ЭТИ ЗНАЧЕНИЯ
// ══════════════════════════════════
const ADMIN_PASSWORD = "twws2026";        // ← поменяй пароль
const SUPABASE_URL   = "https://vkaxlkvadihbkuuoidpj.supabase.co";
const SUPABASE_KEY   = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrYXhsa3ZhZGloYmt1dW9pZHBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxNzY3NjQsImV4cCI6MjA4Nzc1Mjc2NH0.47v0LhzIWHkxikqkgKxB-TUbACOAiEbdwfSXAj0obzQ";

// ══════════════════════════════════
//  AUTH
// ══════════════════════════════════
function doLogin() {
  const val = document.getElementById("passInput").value;
  if (val === ADMIN_PASSWORD) {
    sessionStorage.setItem("twws_admin", "1");
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("adminScreen").style.display = "block";
    loadUpdates();
  } else {
    document.getElementById("loginError").textContent = "Неверный пароль";
    document.getElementById("passInput").value = "";
  }
}
function doLogout() {
  sessionStorage.removeItem("twws_admin");
  location.reload();
}
if (sessionStorage.getItem("twws_admin") === "1") {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("adminScreen").style.display = "block";
}

// ══════════════════════════════════
//  SUPABASE
// ══════════════════════════════════
const HDR = {
  "apikey": SUPABASE_KEY,
  "Authorization": "Bearer " + SUPABASE_KEY,
  "Content-Type": "application/json",
  "Prefer": "return=representation"
};

async function sbFetch(path, method="GET", body=null) {
  const opts = { method, headers: HDR };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPABASE_URL + path, opts);
  const text = await res.text();
  try { return text ? JSON.parse(text) : null; } catch(e) { return null; }
}

// ══════════════════════════════════
//  HELPERS
// ══════════════════════════════════
function parseDate(str) {
  // ДД.ММ.ГГГГ → Date
  const p = str.split(".");
  if (p.length !== 3) return null;
  return new Date(+p[2], +p[1]-1, +p[0]);
}
function isUpcoming(dateStr, timeStr) {
  if (timeStr && /^\d{1,2}:\d{2}$/.test(timeStr)) {
    const dp = dateStr.split('.');
    const tp = timeStr.split(':');
    const isoStr = dp[2]+'-'+dp[1].padStart(2,'0')+'-'+dp[0].padStart(2,'0')+'T'+String(tp[0]).padStart(2,'0')+':'+String(tp[1]).padStart(2,'0')+':00';
    return new Date(isoStr) > new Date();
  }
  const d = parseDate(dateStr);
  if (!d) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  return d > today;
}
function toast(msg, err=false) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast" + (err?" error":"");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

// ══════════════════════════════════
//  LOAD & RENDER
// ══════════════════════════════════
let allUpdates = [];

async function loadUpdates() {
  const data = await sbFetch("/rest/v1/updates?select=*&order=id.desc");
  allUpdates = data || [];
  renderList();
}

function renderList() {
  const el = document.getElementById("updatesList");
  if (!allUpdates.length) {
    el.innerHTML = '<div style="color:var(--text-muted);font-family:Share Tech Mono,monospace;font-size:.8rem;letter-spacing:2px;padding:1rem 0">Нет обновлений. Добавь первое!</div>';
    return;
  }
  el.innerHTML = allUpdates.map(u => {
    const upcoming = isUpcoming(u.date, u.time);
    const changes = u.changes || [];
    const preview = changes.slice(0,2).map(c => c.text).join(" · ") || "Нет описания";
    return `
      <div class="update-item">
        <div class="update-item-left">
          <div class="update-badge ${upcoming?"upcoming":""}">${u.version}</div>
          <div class="update-date-tag">${u.date}</div>
          ${upcoming ? '<div class="upcoming-tag">СКОРО</div>' : ""}
          <div class="update-preview-text">${preview}</div>
        </div>
        <div class="update-item-actions">
          <button class="btn btn-green btn-sm" onclick="editUpdate(${u.id})">✏ ИЗМЕНИТЬ</button>
          <button class="btn btn-red btn-sm" onclick="askDelete(${u.id}, '${u.version}')">✕</button>
        </div>
      </div>`;
  }).join("");
}

// ══════════════════════════════════
//  FORM
// ══════════════════════════════════
let editingId = null;
let screenshots = []; // { dataUrl, name }

function showAddForm() {
  editingId = null;
  screenshots = [];
  document.getElementById("fVersion").value = "";
  document.getElementById("fDate").value = "";
  document.getElementById("fTime").value = "";
  document.getElementById("changesList").innerHTML = "";
  renderScreenshots();
  addChangeRow(); addChangeRow(); addChangeRow();
  document.getElementById("formTitle").textContent = "НОВОЕ ОБНОВЛЕНИЕ";
  document.getElementById("formSection").style.display = "block";
  document.getElementById("formSection").scrollIntoView({behavior:"smooth"});
}

function editUpdate(id) {
  const u = allUpdates.find(x => x.id === id);
  if (!u) return;
  editingId = id;
  screenshots = (u.screenshots || []).map((s,i) => ({dataUrl:s, name:"img"+i}));
  document.getElementById("fVersion").value = u.version || "";
  document.getElementById("fDate").value = u.date || "";
  document.getElementById("fTime").value = u.time || "";
  document.getElementById("changesList").innerHTML = "";
  (u.changes || []).forEach(c => addChangeRow(c.type||"+", c.text||""));
  renderScreenshots();
  document.getElementById("formTitle").textContent = "РЕДАКТИРОВАТЬ: " + u.version;
  document.getElementById("formSection").style.display = "block";
  document.getElementById("formSection").scrollIntoView({behavior:"smooth"});
}

function cancelForm() {
  document.getElementById("formSection").style.display = "none";
  editingId = null;
}

function addChangeRow(type="+", text="") {
  const row = document.createElement("div");
  row.className = "change-row";
  row.innerHTML = `
    <select class="change-type">
      <option value="+" ${type==="+"?"selected":""}>[ + ]</option>
      <option value="-" ${type==="-"?"selected":""}>[ - ]</option>
      <option value="~" ${type==="~"?"selected":""}>[ ~ ]</option>
    </select>
    <input class="change-input" type="text" placeholder="Описание изменения..." value="${text.replace(/"/g,'&quot;')}" />
    <button class="change-del" onclick="this.parentElement.remove()">✕</button>
  `;
  document.getElementById("changesList").appendChild(row);
}

function getChanges() {
  return [...document.getElementById("changesList").querySelectorAll(".change-row")]
    .map(r => ({
      type: r.querySelector("select").value,
      text: r.querySelector("input").value.trim()
    }))
    .filter(c => c.text);
}

async function saveUpdate() {
  const version = document.getElementById("fVersion").value.trim();
  const date    = document.getElementById("fDate").value.trim();
  const changes = getChanges();
  const msg     = document.getElementById("formMsg");

  if (!version) { msg.textContent = "Укажи версию"; msg.style.color="var(--red)"; return; }
  if (!date || !parseDate(date)) { msg.textContent = "Дата: ДД.ММ.ГГГГ"; msg.style.color="var(--red)"; return; }

  msg.textContent = "Сохраняю..."; msg.style.color="var(--text-muted)";

  const time = document.getElementById("fTime").value.trim();
  const payload = {
    version,
    date,
    time: time || null,
    changes,
    screenshots: screenshots.map(s => s.dataUrl),
    upcoming: isUpcoming(date, time)
  };

  let result;
  if (editingId) {
    result = await sbFetch(`/rest/v1/updates?id=eq.${editingId}`, "PATCH", payload);
  } else {
    result = await sbFetch("/rest/v1/updates", "POST", payload);
  }

  msg.textContent = "";
  toast(editingId ? "✓ Обновление сохранено" : "✓ Обновление добавлено");
  cancelForm();
  loadUpdates();
}

// ══════════════════════════════════
//  SCREENSHOTS
// ══════════════════════════════════
function handleImgUpload(e) {
  const files = [...e.target.files];
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      screenshots.push({ dataUrl: ev.target.result, name: file.name });
      renderScreenshots();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = "";
}

function renderScreenshots() {
  const area = document.getElementById("screenshotsArea");
  area.innerHTML = screenshots.map((s,i) => `
    <div class="screenshot-thumb">
      <img src="${s.dataUrl}" alt="${s.name}">
      <button class="remove-img" onclick="removeScreenshot(${i})">✕</button>
    </div>
  `).join("") + `
    <div class="upload-btn" onclick="document.getElementById(\'imgInput\').click()">
      <span>📷</span>загрузить
    </div>`;
}

function removeScreenshot(i) {
  screenshots.splice(i, 1);
  renderScreenshots();
}

// ══════════════════════════════════
//  DELETE
// ══════════════════════════════════
let deleteId = null;
function askDelete(id, version) {
  deleteId = id;
  document.getElementById("confirmText").textContent = `Удалить обновление ${version}? Это действие нельзя отменить.`;
  document.getElementById("confirmOverlay").classList.add("open");
}
function closeConfirm() {
  document.getElementById("confirmOverlay").classList.remove("open");
  deleteId = null;
}
async function confirmDelete() {
  if (!deleteId) return;
  await sbFetch(`/rest/v1/updates?id=eq.${deleteId}`, "DELETE");
  closeConfirm();
  toast("✓ Удалено");
  loadUpdates();
}

// init
if (sessionStorage.getItem("twws_admin") === "1") loadUpdates();
</script>
